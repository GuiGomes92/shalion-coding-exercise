spring:
  application:
    name: demoapi
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate.default_schema: public
      hibernate.format_sql: true
      hibernate.use_sql_comments: true